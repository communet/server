services:
  adminer:
    image: adminer
    ports:
      - 8082:8080
    restart: always

  db:
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    image: postgres
    ports:
      - ${DB_PORT}:5432
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:latest
    restart: always
    ports:
      - ${REDIS_PORT}:6379
    volumes:
      - ./redis_data:/data

volumes:
  pgdata:
  redis_data:
