services:
  adminer:
    image: adminer
    container_name: communet_adminer
    env_file:
      - .env
    ports:
      - ${ADMINER_PORT}:8080
    restart: always

  db:
    image: postgres:17-alpine
    container_name: communet_postgres
    env_file:
      - .env
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - ${DB_PORT}:5432
    restart: always
    volumes:
      - ./pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
