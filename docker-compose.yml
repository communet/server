services:
  adminer:
    image: adminer
    ports:
      - ${ADMINER_PORT}:8080
    restart: always

  db:
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    image: postgres
    ports:
      - ${DB_PORT}:5432
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:latest
    restart: always
    ports:
      - ${REDIS_PORT}:6379
    volumes:
      - ./redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - ${MINIO_API_PORT}:9000
      - ${MINIO_CLIENT_PORT}:9001
    environment:
      MINIO_ROOT_USER: ${MINIO_USERNAME}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - ./minio_data:/data
    command: server /data --console-address ":9001"
    restart: always

volumes:
  pgdata:
  redis_data:
  minio_data:
