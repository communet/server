services:
  adminer:
    image: adminer
    ports:
      - 8082:8080
    restart: always

  db:
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    image: postgres
    ports:
      - 5433:5432
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.12.1
    ulimits:
      memlock: -1
    restart: always
    ports:
      - 6381:6379
    volumes:
      - redis_data:/data

volumes:
  pgdata:

  redis_data: